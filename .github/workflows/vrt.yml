# Dogfoods the incremental VRT machinery on the example app. This job only
# *plans* the run (`svrt plan`) — it prints, for the PR's diff, whether VRT
# would run full or incremental, which files changed, and which fullRunTriggers
# matched — so there are no committed baselines and it never fails spuriously.
#
# The full capture-and-compare job is included below as a commented template.
# Enabling it needs baselines that match the CI renderer; the simplest way is
# to capture them inside the pinned Playwright container and carry them between
# runs as an artifact (kept out of git). See the block at the bottom.
name: VRT

on:
  pull_request:

permissions:
  contents: read

jobs:
  plan:
    name: incremental plan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # svrt needs history to compute a merge-base
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Plan the incremental run
        working-directory: examples/basic
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          svrt() { node node_modules/storybook-addon-vrt/dist/cli.mjs "$@"; }
          svrt plan --changed "$BASE"
          {
            echo '## VRT plan (`--changed` preview)'
            echo
            echo '```json'
            svrt plan --changed "$BASE" --json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

# ---------------------------------------------------------------------------
# Full capture + compare (opt-in). Uncomment and adapt when you are ready to
# maintain baselines. It keeps PNGs out of git by carrying the baseline as an
# artifact: `main` captures a full baseline and uploads it; PRs download that
# baseline and run only the affected stories with `--changed`.
